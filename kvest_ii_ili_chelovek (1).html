.choices{display:flex;flex-direction:column;gap:7px;margin-bottom:.5rem}
.btn{padding:11px 14px;border-radius:10px;border:1.5px solid #ccc;background:#fff;font-size:13px;text-align:left;cursor:pointer;line-height:1.45;transition:background .15s;color:#1a1a1a}
.btn:hover:not(:disabled){background:#f0eeff}
.btn:disabled{cursor:default}
.btn.ok{background:#EAF3DE;border-color:#3B6D11;color:#27500A}
.btn.no{background:#FCEBEB;border-color:#A32D2D;color:#791F1F}
.fb{border-radius:10px;padding:.75rem 1rem;font-size:13px;line-height:1.55;display:none;margin-top:.5rem}
.fb.show{display:block}
.fb.ok{background:#EAF3DE;color:#27500A;border:1px solid #C0DD97}
.fb.no{background:#FCEBEB;color:#791F1F;border:1px solid #F7C1C1}
.fbh{font-weight:700;margin-bottom:3px}
.next{margin-top:.75rem;width:100%;padding:13px;border-radius:12px;border:none;background:#534AB7;color:#fff;font-size:14px;font-weight:600;cursor:pointer;display:none;transition:background .15s}
.next:hover{background:#3C3489}

/* финал */
.end{text-align:center;padding:1.5rem .5rem 2rem;display:none}
.escore{font-size:48px;font-weight:700;color:#3C3489}
.esub{font-size:13px;color:#888;margin-bottom:.75rem}

.restart{padding:12px 28px;border-radius:12px;border:none;background:#534AB7;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.restart:hover{background:#3C3489}

/* футер */
.footer{text-align:center;padding:1.5rem 0 2rem;font-size:12px;color:#aaa}

var cur=0,score=0,ans=false;

function render(){
  var s=Q[cur];
  var p=document.getElementById('pill');
  p.textContent=s.pill; p.style.background=s.bg; p.style.color=s.color;
  document.getElementById('bfill').style.width=(cur/Q.length*100)+'%';
  document.getElementById('bfill').style.background=s.color;
  document.getElementById('star').textContent='⭐ '+score;
  document.getElementById('trapwrap').innerHTML=s.trap?'<div class="trap">'+s.trapT+'</div>':'';
  var c=document.getElementById('card');
  c.style.background=s.bg; c.style.borderColor=s.border;
  document.getElementById('loc').textContent=s.loc; document.getElementById('loc').style.color=s.color;
  document.getElementById('ttl').textContent=s.ttl; document.getElementById('ttl').style.color=s.color;
  var b=document.getElementById('body'); b.innerHTML='';
  s.body.forEach(function(x){
    var l=document.createElement('span'); l.className='lbl'; l.textContent=x.l; l.style.color=s.color;
    b.appendChild(l); b.appendChild(document.createTextNode(x.t));
  });
  var ch=document.getElementById('choices'); ch.innerHTML='';
  s.ch.forEach(function(x,i){
    var btn=document.createElement('button'); btn.className='btn'; btn.textContent=x.t;
    btn.onclick=function(){pick(i);};
    ch.appendChild(btn);
  });
  document.getElementById('fb').className='fb';
  document.getElementById('next').style.display='none';
  ans=false;
}

function pick(idx){
  if(ans)return; ans=true;
  var s=Q[cur];
  var btns=document.querySelectorAll('.btn');
  btns.forEach(function(b){b.disabled=true;});
  var ok=s.ch[idx].a;
  if(ok)score++;
  btns[idx].className='btn '+(ok?'ok':'no');
  if(!ok){var ci=s.ch.findIndex(function(c){return c.a;});btns[ci].className='btn ok';}
  var d=ok?s.ok:s.no;
  document.getElementById('fbh').textContent=d.h;
  document.getElementById('fbt').textContent=d.t;
  document.getElementById('fb').className='fb show '+(ok?'ok':'no');
  document.getElementById('star').textContent='⭐ '+score;
  var n=document.getElementById('next');
  n.style.display='block';
  n.textContent=cur<Q.length-1?'Следующая глава →':'🏆 Узнать свой уровень →';
}

function go(){
  cur++;
  if(cur>=Q.length)fin();
  else render();
}

function fin(){
  document.getElementById('bfill').style.width='100%';
  document.getElementById('game').style.display='none';
  var e=document.getElementById('end');
  e.style.display='block';
  var lv;
  if(score<=4)lv={e:'🌱',badge:'Новичок',bc:'#FAEEDA',tc:'#633806',t:'ИИ тебя ещё обманывает — версия была сложная! Подписывайся, прокачиваемся вместе 🙌'};
  else if(score<=6)lv={e:'🔍',badge:'Детектив ИИ',bc:'#E1F5EE',tc:'#085041',t:'Хороший результат! Ловушки немного запутали, но основное чувствуешь верно. Ещё немного — и станешь экспертом!'};
  else if(score<=8)lv={e:'🚀',badge:'Продвинутый',bc:'#E6F1FB',tc:'#0C447C',t:'Отлично! Справляешься даже с ловушками. Очень сильный уровень — почти эксперт!'};
  else lv={e:'🏆',badge:'Эксперт ИИ',bc:'#EEEDFE',tc:'#3C3489',t:'Феноменально! Все ловушки — и не сломалась. Настоящий ИИ-детектив! 🚀'};
  var share='Прошла сложный квест «ИИ или Человек?» — '+score+'/10 '+lv.e+' Там есть ловушки! Попробуй сама! (не забудь VPN 😄)';
  e.innerHTML='<div style="font-size:52px;margin-bottom:6px">'+lv.e+'</div>'
    +'<div class="escore">'+score+' / 10</div>'
    +'<div class="esub">правильных ответов</div>'
    +'<span class="ebadge" style="background:'+lv.bc+';color:'+lv.tc+'">'+lv.badge+'</span>'
    +'<div class="etext">'+lv.t+'</div>'
    +'<div class="sharebox">💬 Скопируй и отметь подругу:<div class="sharetext">'+share+'</div></div>'
    +'<button class="restart" onclick="restart()">Сыграть ещё раз</button>';
}

function restart(){
  cur=0;score=0;
  document.getElementById('end').style.display='none';
  document.getElementById('game').style.display='block';
  render();
}

render();
</script>
</body>
</html>
